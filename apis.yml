aid: weave-hq
url: https://raw.githubusercontent.com/api-evangelist/weave-hq/refs/heads/main/apis.yml
name: Weave
kind: company
description: Weave is an all-in-one customer and patient communication and payments
  platform for small healthcare businesses - dental, optometry, veterinary, medical,
  audiology, and specialty practices. It unifies VoIP phone, two-way texting,
  online scheduling, digital forms, payments (text-to-pay), review generation, and
  email into a single system that syncs with practice management and EHR software.
  The Weave developer platform exposes a REST API (base https://api.weaveconnect.com)
  for building integrations across messaging, phone and calls, contacts, scheduling
  and appointments, payments, digital forms, reviews, and event subscriptions,
  authenticated with OAuth 2.0 bearer tokens issued through Weave's OIDC provider.
  The public API reference is published in the Weave Developer Portal at
  dp.getweave.com, which requires a developer login.
