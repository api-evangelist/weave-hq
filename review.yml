aid: weave-hq
name: Weave
review:
  question: Does Weave expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Weave's documented developer surface is a
    request/response REST API over HTTPS at https://api.weaveconnect.com,
    authenticated with OAuth 2.0 bearer tokens from Weave's OIDC provider. A
    WebSocket endpoint (wss://api.weaveconnect.com/v2/client-manager/ws) is
    observable in the Weave Developer Portal's own client configuration, but it is
    an internal transport used by Weave's first-party applications (a
    "client-manager" realtime channel), not a documented public developer
    WebSocket API. Near-real-time integration for third parties is instead exposed
    through the REST events/subscription endpoints (/v1/events, /v1/subscribe,
    /v1/subscribe/multi, /v1/unsubscribe). Because there is no documented public
    server-push transport on Weave's developer API, no AsyncAPI document was
    created.
findings:
  summary: |
    Weave does not publish a documented public WebSocket API for third-party
    developers. Weave is a customer/patient communication and payments platform
    for small healthcare businesses (dental, optometry, veterinary, medical, and
    specialty practices). Its developer platform is a REST API served at
    https://api.weaveconnect.com and authenticated with OAuth 2.0 bearer access
    tokens issued by Weave's OIDC provider (issuer https://oidc.weaveconnect.com;
    token endpoints under https://auth.weaveconnect.com/oauth2/default). The
    authoritative API reference lives in the Weave Developer Portal at
    https://dp.getweave.com, which is a single-page app gated behind a developer
    login. A real WebSocket endpoint,
    wss://api.weaveconnect.com/v2/client-manager/ws, is present in the portal's
    published runtime configuration, but it is an internal first-party app
    transport (a client-manager realtime channel), not a documented public
    developer WebSocket surface. For third-party real-time needs, Weave exposes
    REST event and subscription endpoints rather than a public ws:// / wss:// API.
  openSource: |
    Weave is a proprietary, closed-source commercial SaaS platform. Its GitHub
    organization (https://github.com/getweave) exists but publishes no public
    repositories. There is no self-hostable or open-source component to Weave's
    API; access is tied to a paid per-location subscription.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.weaveconnect.com
      documented: true
      note: Primary developer API. OAuth 2.0 bearer tokens; requests scoped to a location. Reference is login-gated at dp.getweave.com.
    - protocol: REST Events / Subscriptions
      scheme: https
      baseURL: https://api.weaveconnect.com
      documented: true
      note: /v1/events plus /v1/subscribe, /v1/subscribe/multi, /v1/unsubscribe provide the near-real-time integration path over REST, not a socket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: >-
        wss://api.weaveconnect.com/v2/client-manager/ws is observable in the
        Weave Developer Portal runtime config, but it is an internal first-party
        app transport, not a documented public developer WebSocket API.
  endpointsConfirmed:
