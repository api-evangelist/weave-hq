actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No public WebSocket API surface is documented, and Weave's own developer API
    is request/response REST over HTTPS with an OAuth 2.0 bearer scheme. No
    AsyncAPI document was created because there is no documented public
    server-push transport on Weave's developer API; the only WebSocket observed is
    an internal first-party app channel, and third-party real-time integration is
    offered via REST event/subscription endpoints.
