    - POST https://api.weaveconnect.com/v1/unsubscribe
  endpointsModeled: |
    The path list and base URL above are grounded in Weave's own published
    Developer Portal client (its runtime configuration and the API calls it makes
    against https://api.weaveconnect.com), so path/method coverage is
    high-confidence. However, because the authoritative reference at
    dp.getweave.com is gated behind a developer login, the request bodies, query
    parameters (including exact location scoping), response schemas, and HTTP verbs
    for mutation endpoints in the OpenAPI document are modeled and should be
    reconciled against the official reference once portal access is available. The
    location_id query parameter is inferred as the location-scoping mechanism.
  websocketNote: |
    A single WebSocket endpoint (wss://api.weaveconnect.com/v2/client-manager/ws)
    exists and is used by Weave's own applications, but it is not documented as a
    public developer API. The public/documented developer integration path for
    real-time activity is the REST events + subscription endpoints. Answer to the
    review question is therefore false.
