description: >-
  FinOps view of Weave spend. Weave is a per-location SaaS subscription rather than
  a usage-metered API. The dominant, predictable cost is the recurring monthly plan
  fee charged per physical location (Pro / Elite / Ultimate tiers), plus one-time
  onboarding/setup and forms-migration fees at activation. The developer API at
  api.weaveconnect.com carries no separate per-call charge - it is a channel into
  the same subscription. Variable costs are limited and product-driven: bulk/mass
  texting is quota-based (overage or add-on packs may apply), and Weave Payments
  carries transaction processing fees on card payments collected through text-to-pay
  and card-on-file. Payment processing rates and any bulk-text overage pricing are
  not reconciled here.
notes: >-
  Cost is largely fixed and headcount-of-locations driven. For multi-location
  practices the primary lever is the number of active locations. Payment processing
  fees scale with collected payment volume. Verify subscription tier prices,
  onboarding fees, bulk-text overage, and Weave Payments processing rates with Weave
  during reconciliation.
