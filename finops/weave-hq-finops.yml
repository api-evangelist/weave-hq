meters:
- name: location_subscription
  description: Recurring monthly subscription fee charged per active Weave location.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - location
  - plan
- name: onboarding_fee
  description: One-time onboarding/setup and forms-migration charges at activation.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - location
- name: bulk_messages
  description: Bulk/mass text messages sent against the per-account quota; overage may apply.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - location
- name: payment_processing
  description: Card processing fees on payments collected via Weave Payments (text-to-pay, card-on-file).
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - location
principles:
- name: Visibility
  description: Track the number of active locations and their plan tiers, plus Weave Payments processing volume and bulk-text usage, to see total Weave spend.
- name: Allocation
  description: Map each Weave location's subscription and payment fees to the corresponding office/cost center in a multi-location practice.
- name: Optimization
  description: Right-size plan tiers per location to features actually used, consolidate where possible, and monitor bulk-text quota to avoid overage; compare Weave Payments processing rates against alternatives.
- name: Accountability
  description: Assign an owner per location for the subscription and payment fees, and review monthly against expected location count and payment volume.
